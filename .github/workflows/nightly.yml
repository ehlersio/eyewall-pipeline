name: EyeWall Nightly Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # 3:00 AM ET (UTC-4 during EDT)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .   # adjust if pipeline files are in a subdirectory

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        run: |
          pip install ruff --quiet
          ruff check .
          ruff format --check .

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NHL_SEASON: ${{ secrets.NHL_SEASON }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: python run.py

      - name: Notify on failure
        if: failure()
        run: echo "Pipeline failed — check logs above"

      - name: Ingest PWHL PBP events (current season)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pwhl_pbp_events.py
        # Skips games already in pwhl_pbp_events (idempotent by default).
        # Only processes new completed games since last run.
        # For the initial full backfill, run locally:
        #   python pwhl_pbp_events.py 6
        #   python pwhl_pbp_events.py 7
        #   python pwhl_pbp_events.py 8 --force
