name: EyeWall PWHL Nightly Pipeline

on:
  schedule:
    - cron: '20 7 * * *'  # 3:20 AM ET (UTC-4 during EDT) — offset 20min after NHL pipeline
  workflow_dispatch:

jobs:
  run-pwhl-pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch PWHL news and push to Worker
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          EYEWALL_POLL_SECRET: ${{ secrets.EYEWALL_POLL_SECRET }}
        run: python pwhl_news.py

      - name: Run pwhl_stats.py (rosters, player/goalie/team stats, game log)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PWHL_SEASON: ${{ secrets.PWHL_SEASON }}
        run: python pwhl_stats.py
        # Populates pwhl_game_log (which games are Final), pwhl_players,
        # pwhl_player_seasons, pwhl_goalie_seasons, pwhl_team_seasons.
        # Everything below this step depends on pwhl_game_log/pwhl_players
        # being current — this was NOT previously scheduled anywhere, only
        # ever run manually, so pwhl_pbp_events.py below has been running
        # nightly against whatever game_log snapshot was last set by hand.

      - name: Ingest PWHL shot events (goals, shots, blocked shots)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PWHL_SEASON: ${{ secrets.PWHL_SEASON }}
        run: python pwhl_shot_events.py
        # Skips games already in pwhl_shot_events (idempotent by default).
        # This is the actual source of goal data for pwhl_milestones.py —
        # separate from and unrelated to pwhl_pbp_events.py below, which
        # explicitly skips shot/goal events (owns hits/penalties/faceoffs/
        # goalie changes instead). Also was NOT previously scheduled.

      - name: Ingest PWHL PBP events (current season)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PWHL_SEASON: ${{ secrets.PWHL_SEASON }}
        run: python pwhl_pbp_events.py
        # Skips games already in pwhl_pbp_events (idempotent by default).
        # Only processes new completed games since last run.
        # For the initial full backfill, run locally:
        #   python pwhl_pbp_events.py 6
        #   python pwhl_pbp_events.py 7
        #   python pwhl_pbp_events.py 8 --force

      - name: Run pwhl_milestones.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python pwhl_milestones.py
        continue-on-error: false
        # Depends on pwhl_stats.py (pwhl_game_log, pwhl_player_seasons,
        # pwhl_goalie_seasons) and pwhl_shot_events.py (pwhl_shot_events) —
        # does NOT depend on pwhl_pbp_events.py, v1 doesn't read that table.
        # Placed last regardless since it doesn't hurt to wait.

      - name: Notify on failure
        if: failure()
        run: echo "PWHL pipeline failed — check logs above"
