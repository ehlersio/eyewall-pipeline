name: Draft Day Ingest

on:
  schedule:
    # Round 1 — 10:45 PM UTC = 6:45 PM ET June 26 (draft starts 7pm ET, buffer to catch first pick)
    - cron: '45 22 26 6 *'
    # Rounds 2–7 — 2:00 PM UTC = 10:00 AM ET June 27
    - cron: '0 14 27 6 *'
  workflow_dispatch: # manual backup trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6hr GH Actions limit — covers full draft day

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Purge stale draft picks KV cache
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          NS_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces" \
            -H "Authorization: Bearer $CLOUDFLARE_API_KEY" | \
            python3 -c "import sys,json; ns=json.load(sys.stdin)['result']; print(next(n['id'] for n in ns if n['title'] == 'eyewall-cache'))")
          echo "KV namespace: $NS_ID"

          KEYS=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$NS_ID/keys?prefix=draft%3Apicks%3A2026" \
            -H "Authorization: Bearer $CLOUDFLARE_API_KEY" | \
            python3 -c "import sys,json; [print(k['name']) for k in json.load(sys.stdin).get('result', [])]")

          if [ -z "$KEYS" ]; then
            echo "No stale draft picks keys found — nothing to purge."
          else
            echo "$KEYS" | while read KEY; do
              ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$KEY")
              curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/storage/kv/namespaces/$NS_ID/keys/$ENCODED" \
                -H "Authorization: Bearer $CLOUDFLARE_API_KEY"
              echo "Deleted: $KEY"
            done
          fi

      - name: Poll picks until draft complete
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
          EYEWALL_POLL_SECRET: ${{ secrets.EYEWALL_POLL_SECRET }}
        run: |
          echo "Starting draft pick polling loop..."
          while true; do
            python draft_ingest.py --poll-picks
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 99 ]; then
              echo "All 224 picks inserted — draft complete. Exiting."
              break
            fi
            echo "Sleeping 60s before next poll..."
            sleep 60
          done

      - name: Summary
        if: always()
        run: echo "Draft ingest job finished."
