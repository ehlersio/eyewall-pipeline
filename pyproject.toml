[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (likely bugs + bad practices)
    "UP",  # pyupgrade (modernise Python syntax)
    "C4",  # flake8-comprehensions (simplify list/dict/set comprehensions)
    "SIM", # flake8-simplify (simplifiable code patterns)
    "RUF", # Ruff-native rules
]
ignore = [
    "E501",   # line too long — handled by formatter, not linter
    "B008",   # do not perform function calls in default args (too noisy for pipeline scripts)
    "SIM108", # ternary operator — often less readable in data pipeline context
    "UP007",  # use X | Y for type hints — requires py310+, keep Optional[] for clarity
    "RUF013", # implicit Optional — consistent pattern throughout codebase (str = None)
    "SIM105", # contextlib.suppress — try/except/pass is intentional for non-critical DB writes
    "B905",   # zip() strict= — lists are guaranteed same length by construction in validate_rapm
    "RUF002", # en-dash in docstrings — editor encoding artifact, not a real issue
    "RUF003", # en-dash in comments — editor encoding artifact, not a real issue
    "E701",   # multiple statements on one line — intentional in compact helper functions
]

# Never flag these files
exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
]

[tool.ruff.lint.isort]
known-first-party = ["db"]  # treat db.py as a first-party import

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
